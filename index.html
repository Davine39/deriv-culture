            color: #333;
        }

        .gradient-text {
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .office-card {
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
            border-left: 5px solid #06b6d4;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .office-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(6, 182, 212, 0.3);
            border-left-color: #8b5cf6;
        }

        .btn-primary {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
        }

        .flip-card {
            background-size: cover;
            background-position: center;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
            }
            50% {
                box-shadow: 0 0 40px rgba(139, 92, 246, 0.6);
            }
        }

        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .nav-link {
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #06b6d4, #8b5cf6);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: linear-gradient(135deg, #06b6d4, #8b5cf6);
            color: white;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .float {
            animation: float 3s ease-in-out infinite;
        }

                                            <textarea
                                                placeholder="E.g., Launch an AI feature, Learn new skills, etc."
                                                className="w-full p-3 rounded-lg border-2 border-purple-400 focus:outline-none"
                                                rows="3"
                                                value={formData.goal}
                                                onChange={(e) => setFormData({...formData, goal: e.target.value})}
                                            ></textarea>
                                        </div>

                                        <div>
                                            <label className="text-white font-bold block mb-2">Your Hobbies</label>
                                            <div className="grid grid-cols-2 gap-3">
                                                {hobbies.map(h => (
                                                    <label key={h} className="flex items-center gap-2 text-white cursor-pointer">
                                                        <input
                                                            type="checkbox"
                                                            checked={formData.hobbies.includes(h)}
                                                            onChange={(e) => {
                                                                if (e.target.checked) {
                                                                    setFormData({...formData, hobbies: [...formData.hobbies, h]});
                                                                } else {
                                                                    setFormData({...formData, hobbies: formData.hobbies.filter(hob => hob !== h)});
                                                                }
                                                            }}
                                                        />
                                                        {h}
                                                    </label>
                                                ))}
                                            </div>
                                        </div>

                                        <div>
                                            <label className="text-white font-bold block mb-2">Your Favorite Drink</label>
                                            <select
                                                className="w-full p-3 rounded-lg border-2 border-pink-400 focus:outline-none text-gray-900 font-bold"
                                                value={formData.drink}
                                                onChange={(e) => setFormData({...formData, drink: e.target.value})}
                                            >
                                                <option value="">Pick your drink</option>
                                                {drinks.map(d => <option key={d} value={d}>{d}</option>)}
                                            </select>
                                        </div>

                                        <button
                                            type="button"
                                            onClick={handlePair}
                                            className="btn-primary w-full py-4 rounded-lg font-bold text-lg"
                                        >
                                            ✨ Get Paired Now
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="pt-24 pb-12">
                        <div className="max-w-4xl mx-auto px-6">
                            <h1 className="text-4xl font-bold text-white mb-8">🎲 Your Perfect Match!</h1>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                {/* You Card */}
                                <div className="glass p-8 rounded-xl text-center pulse-glow">
                                    <div className="text-6xl mb-4">👤</div>
                                    <h2 className="text-2xl font-bold text-cyan-600 mb-2">
                                        {formData.name || "You (Anonymous)"}
                                    </h2>
                                    <p className="text-lg text-gray-700 mb-4">{formData.office}</p>
                                    <div className="bg-cyan-50 p-4 rounded-lg mb-4">
                                        <p className="text-sm text-gray-600"><strong>Your Goal:</strong></p>
                                        <p className="text-gray-900 font-semibold">{formData.goal || "Open to connections!"}</p>
                                    </div>
                                    <div className="flex flex-wrap gap-2 justify-center">
                                        {formData.hobbies.map(h => <span key={h} className="badge bg-gradient-to-r from-cyan-400 to-cyan-600">{h}</span>)}
                                    </div>
                                    <p className="text-sm text-gray-600 mt-4">☕ Drinks: <strong>{formData.drink}</strong></p>
                                </div>

                                {/* Partner Card */}
                                <div className="glass p-8 rounded-xl text-center pulse-glow" style={{animationDelay: "0.5s"}}>
                                    <div className="text-6xl mb-4">{currentPair.partner.emoji}</div>
                                    <h2 className="text-2xl font-bold text-purple-600 mb-2">
                                        Someone from {currentPair.partner.office}
                                    </h2>
                                    <p className="text-lg text-gray-700 mb-4">Ready to connect! 🌟</p>
                                    <div className="bg-purple-50 p-4 rounded-lg mb-4">
                                        <p className="text-sm text-gray-600"><strong>Conversation Starter:</strong></p>
                                        <p className="text-gray-900 font-semibold italic">"{currentPair.question}"</p>
                                    </div>
                                    <div className="flex flex-wrap gap-2 justify-center">
                                        <span className="badge bg-gradient-to-r from-purple-400 to-purple-600">Ready to Chat</span>
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-4 justify-center">
                                <button
                                    onClick={() => {
                                        setShowForm(true);
                                        setCurrentPair(null);
                                    }}
                                    className="btn-primary px-8 py-3 rounded-lg font-bold"
                                >
                                    🔄 Get Another Match
                                </button>
                                <button
                                    onClick={() => {
                                        alert("💌 Connection started! Check Slack or reach out directly to continue the conversation!");
                                    }}
                                    className="btn-secondary px-8 py-3 rounded-lg font-bold"
                                >
                                    💬 Start Conversation
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // Leaderboard Page
            const LeaderboardPage = () => (
                <div className="pt-24 pb-12">
                    <div className="max-w-4xl mx-auto px-6">
                        <h1 className="text-4xl font-bold text-white mb-8">🏆 Tribe Stats</h1>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="glass p-6 rounded-xl text-center">
                                <div className="text-4xl mb-2">🌍</div>
                                <p className="text-gray-600 mb-2">Total Offices Connected</p>
                                <p className="text-5xl font-bold gradient-text">16</p>
                            </div>
                            <div className="glass p-6 rounded-xl text-center">
                                <div className="text-4xl mb-2">🤝</div>
                                <p className="text-gray-600 mb-2">Active Pairings</p>
                                <p className="text-5xl font-bold gradient-text">342</p>
                            </div>
                            <div className="glass p-6 rounded-xl text-center">
                                <div className="text-4xl mb-2">✨</div>
                                <p className="text-gray-600 mb-2">Conversations Started</p>
                                <p className="text-5xl font-bold gradient-text">1,284</p>
                            </div>
                        </div>

                        <div className="glass p-8 rounded-xl mb-8">
                            <h2 className="text-2xl font-bold text-white mb-6">🌟 Most Active Offices</h2>
                            <div className="space-y-4">
                                {officesData.slice(0, 8).map((office, idx) => (
                                    <div key={office.id} className="flex items-center justify-between p-4 bg-gradient-to-r from-cyan-50 to-purple-50 rounded-lg">
                                        <div className="flex items-center gap-4">
                                            <div className="text-3xl font-bold text-cyan-600 w-8">{idx + 1}</div>
                                            <div>
                                                <p className="text-lg font-bold text-gray-900">{office.emoji} {office.name}</p>
                                                <p className="text-sm text-gray-600">{office.country}</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-2xl font-bold gradient-text">{Math.floor(Math.random() * 100) + 30}</p>
                                            <p className="text-xs text-gray-600">connections</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="glass p-8 rounded-xl">
                            <h2 className="text-2xl font-bold text-white mb-6">🎖️ Achievements Unlocked</h2>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                {[
                                    { emoji: "🌈", name: "Rainbow Tribe", desc: "Connect with 5+ offices" },
                                    { emoji: "🚀", name: "Fast Track", desc: "100 connections" },
                                    { emoji: "🌍", name: "Global Citizen", desc: "Visit all 16 offices" },
                                    { emoji: "💬", name: "Chatterbox", desc: "Start 50 conversations" },
                                    { emoji: "❤️", name: "Community Hero", desc: "Help others connect" },
                                    { emoji: "⭐", name: "Tribe Champion", desc: "Top 1% active" }
                                ].map((badge, i) => (
                                    <div key={i} className="bg-gradient-to-br from-yellow-100 to-orange-100 p-4 rounded-lg text-center">
                                        <div className="text-4xl mb-2">{badge.emoji}</div>
                                        <p className="font-bold text-gray-900 text-sm">{badge.name}</p>
                                        <p className="text-xs text-gray-600">{badge.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            // Footer
            const Footer = () => (
                <div className="bg-black/50 border-t border-white/10 mt-12">
                    <div className="max-w-7xl mx-auto px-6 py-8 text-center text-white">
                        <p className="mb-2">🌍 <span className="gradient-text font-bold">Deriv Tribe</span> — Connecting 16 Offices, One Connection at a Time</p>
                        <p className="text-sm text-gray-400">No boundaries. Real connections. Work that feels alive.</p>
                    </div>
                </div>
            );

            return (
                <div>
                    <NavBar />
                    {page === "home" && <HomePage />}
                    {page === "compare" && <ComparePage />}
                    {page === "pair" && <PairingPage />}
                    {page === "leaderboard" && <LeaderboardPage />}
                    <Footer />
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DerrivTribe />);
    </script>
</body>
</html>
